<!DOCTYPE html>
<html>

<head>
    <title>
        Animals
    </title>

    <style>
        body {
            background-color: rgb(233, 215, 236);
            position: relative;
            margin: 0;
            height: 100vh;
            margin: 0;
        }


        body.dark {
            background-color: #1e1e1e;
            color: white
        }

        body.dark .animalTextSide {
            color: #ddd
        }

        body.dark #change-background {
            background-image: url("https://i.imgur.com/2e7uPqo.png");
            /*alb*/
        }

        body.dark #themeToggle {
            background-size: 55%;
        }

        body.dark #introText {
            background-image: url("https://i.imgur.com/CUNgm7i.png");
            /*alb*/
        }

        .cat-slot {
            position: absolute;
            top: 25%;
            left: 38%;
            width: 700px;
            height: auto;
            z-index: 1;
        }

        .screen {
            position: absolute;
            bottom: 22%;
            left: 41%;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .animalTextSide {
            width: 100%;
            height: 100%;
            font-size: 20px;
            font-family: monospace;
            margin: 0 10px;
            overflow-y: auto;
            color: lab(4.65% 1.5 0.53 / 0.5);
            overflow-y: auto;

        }

        #slotImage {
            /*gif fluture inceput*/
            object-fit: contain;



        }

        #spinBtn {
            /*buton click */
            position: absolute;
            bottom: 17%;
            left: 45.2%;


            width: 60px;
            height: 20px;

            background-image: url("https://i.imgur.com/zxC22Xs.png");

            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
            z-index: 1000;
        }



        #themeToggle {
            width: 120px;
            height: 100px;
            position: absolute;
            top: 1%;
            left: 2%;


            background-image: url("https://i.imgur.com/mF8Awj8.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-color: transparent;
            background-position: center;

            border: none;
            padding: 0;
            cursor: pointer;
            z-index: 1000;
        }

        #change-background {
            width: 180px;
            height: 150px;
            position: absolute;
            top: 93%;
            right: 51%;


            background-image: url("https://i.imgur.com/Aai1bR1.png");
            /*interfata neagra */
            background-size: contain;
            background-repeat: no-repeat;
            background-color: transparent;

            border: none;
            cursor: pointer;
            z-index: 1000;
        }

        #introText {
            position: absolute;
            width: 800px;
            height: 100px;

            bottom: 99%;
            right: 1%;

            background-image: url("https://i.imgur.com/CGFHKTO.png");
            /*interfata neagra */
            background-size: contain;
            background-repeat: no-repeat;
            background-color: transparent;
        }

        #animalTextLeft {
            position: absolute;
            top: 50%;
            left: 20px;
            width: 650px;
            height: 300px;
        }

        #animalTextRight {
            position: absolute;
            top: 50%;
            right: 20px;
            width: 650px;
            height: 300px;
        }
    </style>

<body>

    <div class="slot-row">
        <div class="animalTextSide" id="animalTextLeft"></div>

        <div class="cat-slot">
            <img src="center-item-removebg-preview.png" alt="cat-slot-machine">
            <div class="screen">
                <img id="slotImage" src="https://stardewvalleywiki.com/mediawiki/images/6/6c/ButterflyAnimated.gif"
                    alt="butterfly">
            </div>

            <div id="introText"></div>
            <button id="themeToggle"></button>
            <button id="change-background"></button>





            <div id="spinBtn"></div>

        </div>

        <div class="animalTextSide" id="animalTextRight"></div>

    </div>

    <script src="animal_list.js"></script>


</body>
